<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    width: 48px;
    height: 400px;
    overflow: hidden;
    display: flex;
    align-items: flex-start;
    justify-content: stretch;
  }

  .widget {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding-top: 10px;
    padding-bottom: 10px;
    animation: fadeIn 0.8s ease-out both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .top-label {
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 6px;
    border-bottom: 3px solid #FF6B00;
    padding-bottom: 4px;
    text-shadow:
      -1px -1px 0 #EAE2D4, 1px -1px 0 #EAE2D4,
      -1px  1px 0 #EAE2D4, 1px  1px 0 #EAE2D4;
  }

  .num-wrap {
    background: #FF6B00;
    border: 3px solid #1a1a1a;
    border-right: none;
    box-shadow: -3px 3px 0 #1a1a1a;
    padding: 4px 5px 3px;
    text-align: center;
    margin-bottom: 8px;
  }

  .num-sub {
    font-family: 'Oswald', sans-serif;
    font-size: 8px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.65;
    line-height: 1;
  }

  .likes-num {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    color: #1a1a1a;
    line-height: 1;
    letter-spacing: -1px;
    white-space: nowrap;
  }

  .bar-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }

  .bar-track {
    flex: 1;
    background: #1a1a1a;
    border: 3px solid #1a1a1a;
    border-right: none;
    border-radius: 2px 0 0 2px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    box-shadow: -3px 3px 0 rgba(0,0,0,0.2);
  }

  .bar-track::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      180deg,
      rgba(255,255,255,0.04) 0px, rgba(255,255,255,0.04) 1px,
      transparent 1px, transparent 12px
    );
    z-index: 1;
    pointer-events: none;
  }

  .bar-fill {
    width: 100%;
    background: #FF6B00;
    transition: height 1.4s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    z-index: 2;
    overflow: hidden;
  }

  .bar-fill::after {
    content: '';
    position: absolute;
    top: 0; left: 2px;
    width: 5px; height: 100%;
    background: rgba(255,255,255,0.18);
  }

  .goal-line {
    position: absolute;
    top: 5px; left: 0; right: 0;
    height: 2px;
    background: #FF6B00;
    opacity: 0.4;
    z-index: 3;
  }

  .bar-pct {
    position: absolute;
    top: 8px; left: 0; right: 0;
    text-align: center;
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    font-weight: 700;
    color: rgba(255,255,255,0.75);
    z-index: 4;
    opacity: 0;
    transition: opacity 0.4s;
    letter-spacing: 1px;
  }

  .meta-tag {
    background: #1a1a1a;
    border: 3px solid #1a1a1a;
    border-right: none;
    border-top: none;
    border-radius: 0 0 0 2px;
    padding: 3px 4px;
    text-align: center;
    box-shadow: -3px 3px 0 rgba(0,0,0,0.2);
  }

  .meta-tag span {
    font-family: 'Oswald', sans-serif;
    font-size: 8px;
    font-weight: 700;
    color: #FF6B00;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: block;
    line-height: 1.3;
  }

  .meta-tag .meta-num {
    color: #EAE2D4;
    font-size: 10px;
  }

  .bar-fill.goal {
    background: linear-gradient(to top, #FF6B00, #FFD700);
    animation: pulse-goal 0.7s ease-in-out 4;
  }

  @keyframes pulse-goal {
    0%, 100% { filter: brightness(1); }
    50%       { filter: brightness(1.5); }
  }
</style>
</head>
<body>
<div class="widget">
  <div class="top-label">&#10084; Likes</div>

  <div class="num-wrap">
    <div class="num-sub">ao vivo</div>
    <div class="likes-num" id="num">0</div>
  </div>

  <div class="bar-area">
    <div class="bar-track">
      <div class="goal-line"></div>
      <div class="bar-fill" id="bar">
        <span class="bar-pct" id="bar-pct"></span>
      </div>
    </div>
    <div class="meta-tag">
      <span>meta</span>
      <span class="meta-num" id="meta-lbl">800</span>
    </div>
  </div>
</div>

<script>
  // ============================================================
  //  CONFIGURAÇÕES — edite aqui
  // ============================================================
  const API_KEY    = 'AIzaSyDvxoFCqh2gIXibwhvnClWw0mNLLVOO9hI';
  const VIDEO_ID   = 'A6EwXjGbL_4';
  const META_LIKES = 800;       // ← mude a meta aqui
  const INTERVALO  = 15000;     // atualiza a cada 15s
  // ============================================================

  document.getElementById('meta-lbl').textContent = META_LIKES.toLocaleString('pt-BR');

  function atualizarBarra(likes) {
    const pct   = Math.min((likes / META_LIKES) * 100, 100);
    const bar   = document.getElementById('bar');
    const pctEl = document.getElementById('bar-pct');

    bar.style.height  = Math.max(pct, 1) + '%';
    document.getElementById('num').textContent = likes.toLocaleString('pt-BR');

    if (pct >= 15) {
      pctEl.textContent   = Math.round(pct) + '%';
      pctEl.style.opacity = '1';
    } else {
      pctEl.style.opacity = '0';
    }

    if (pct >= 100) bar.classList.add('goal');
    else            bar.classList.remove('goal');
  }

  async function buscarLikes() {
    try {
      const url =
        'https://www.googleapis.com/youtube/v3/videos' +
        '?part=statistics&id=' + VIDEO_ID + '&key=' + API_KEY;

      const resp = await fetch(url);
      const data = await resp.json();

      if (data.items && data.items.length > 0) {
        const likes = parseInt(data.items[0].statistics.likeCount, 10);
        if (!isNaN(likes)) atualizarBarra(likes);
      }
    } catch (e) {
      console.error('Erro ao buscar likes:', e);
    }
  }

  buscarLikes();
  setInterval(buscarLikes, INTERVALO);
</script>
</body>
</html>
