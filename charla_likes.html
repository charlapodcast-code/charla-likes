<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charla Futebol – Likes</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    width: 100vw;
    height: 100vh;
    font-family: 'Barlow Condensed', sans-serif;
    overflow: hidden;
  }

  .widget {
    width: 340px;
    margin: 0 28px 28px 0;
  }

  /* Cabeçalho */
  .widget-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    padding: 0 2px;
  }

  .widget-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 15px;
    color: #F7F3EC;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-shadow: 2px 2px 0px #000;
  }

  .widget-count {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    color: #FF6B00;
    letter-spacing: 0px;
    text-shadow: 2px 2px 0px #000;
    transition: all 0.4s ease;
  }

  .widget-count .meta-txt {
    font-size: 13px;
    color: #F7F3EC;
    opacity: 0.7;
    margin-left: 2px;
  }

  /* Trilho da barra */
  .bar-track {
    width: 100%;
    height: 22px;
    background: #1a1a1a;
    border: 3px solid #000;
    border-radius: 3px;
    overflow: hidden;
    position: relative;
    box-shadow: 3px 3px 0px #000;
  }

  /* Barra de progresso */
  .bar-fill {
    height: 100%;
    width: 0%;
    background: #FF6B00;
    border-radius: 0;
    transition: width 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    position: relative;
    overflow: hidden;
  }

  /* Efeito de textura na barra */
  .bar-fill::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60px; height: 100%;
    background: rgba(255,255,255,0.2);
    transform: skewX(-20deg);
    animation: shine 2.5s infinite;
  }

  @keyframes shine {
    0%   { left: -100%; }
    40%  { left: 120%; }
    100% { left: 120%; }
  }

  /* Marcador de meta */
  .bar-goal-marker {
    position: absolute;
    right: 0;
    top: -3px;
    bottom: -3px;
    width: 3px;
    background: #F7F3EC;
    opacity: 0.5;
  }

  /* Rodapé da barra */
  .bar-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 5px;
    padding: 0 2px;
  }

  .bar-footer span {
    font-size: 11px;
    font-weight: 700;
    color: #F7F3EC;
    opacity: 0.6;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-shadow: 1px 1px 0px #000;
  }

  /* Animação de entrada */
  .widget {
    animation: slideIn 0.6s ease-out both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Pulso ao bater a meta */
  .bar-fill.goal-reached {
    background: linear-gradient(90deg, #FF6B00, #FFD700);
    animation: pulse-goal 0.8s ease-in-out 3;
  }

  @keyframes pulse-goal {
    0%, 100% { filter: brightness(1); }
    50%       { filter: brightness(1.4); }
  }
</style>
</head>
<body>

<div class="widget">
  <div class="widget-header">
    <span class="widget-title">❤ Likes ao vivo</span>
    <span class="widget-count" id="count-display">
      0<span class="meta-txt"> / <span id="meta-display">1000</span></span>
    </span>
  </div>
  <div class="bar-track">
    <div class="bar-fill" id="bar"></div>
    <div class="bar-goal-marker"></div>
  </div>
  <div class="bar-footer">
    <span>0</span>
    <span>Meta: <span id="meta-footer">1000</span> likes</span>
  </div>
</div>

<script>
  // ============================================================
  //  CONFIGURAÇÕES — edite aqui
  // ============================================================
  const API_KEY    = 'AIzaSyDvxoFCqh2gIXibwhvnClWw0mNLLVOO9hI';   // chave do YouTube Data API v3
  const VIDEO_ID   = 'A6EwXjGbL_4'; // ex: dQw4w9WgXcQ
  const META_LIKES = 800;                       // ← mude a meta aqui
  const INTERVALO  = 15000;                      // atualiza a cada 15s (em ms)
  // ============================================================

  // Preenche meta na tela
  document.getElementById('meta-display').textContent = META_LIKES.toLocaleString('pt-BR');
  document.getElementById('meta-footer').textContent  = META_LIKES.toLocaleString('pt-BR');

  let likesAtuais = 0;

  function atualizarBarra(likes) {
    const pct = Math.min((likes / META_LIKES) * 100, 100);
    const bar  = document.getElementById('bar');

    bar.style.width = pct + '%';
    document.getElementById('count-display').innerHTML =
      likes.toLocaleString('pt-BR') +
      '<span class="meta-txt"> / <span id="meta-display">' +
      META_LIKES.toLocaleString('pt-BR') + '</span></span>';

    if (pct >= 100) {
      bar.classList.add('goal-reached');
    } else {
      bar.classList.remove('goal-reached');
    }
  }

  async function buscarLikes() {
    try {
      const url =
        'https://www.googleapis.com/youtube/v3/videos' +
        '?part=statistics' +
        '&id=' + VIDEO_ID +
        '&key=' + API_KEY;

      const resp = await fetch(url);
      const data = await resp.json();

      if (data.items && data.items.length > 0) {
        const likes = parseInt(data.items[0].statistics.likeCount, 10);
        if (!isNaN(likes)) {
          likesAtuais = likes;
          atualizarBarra(likes);
        }
      }
    } catch (e) {
      console.error('Erro ao buscar likes:', e);
    }
  }

  // Primeira chamada + loop
  buscarLikes();
  setInterval(buscarLikes, INTERVALO);
</script>
</body>
</html>
